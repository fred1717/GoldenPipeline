<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 920" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="1200" height="920" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a2332">GoldenPipeline — Architecture Diagram</text>
  <text x="600" y="58" text-anchor="middle" font-size="13" fill="#5a6577">Packer · Terraform · pytest · SSM · GitHub Actions OIDC · CIS Benchmark for Amazon Linux 2023</text>

  <!-- ================================================================ -->
  <!-- CI/CD PIPELINE — 5 stages                                        -->
  <!-- ================================================================ -->
  <rect x="30" y="78" width="1140" height="115" rx="8" fill="#eef1f6" stroke="#c5cdd8" stroke-width="1.2"/>
  <text x="50" y="100" font-size="13" font-weight="bold" fill="#1a2332">GitHub Actions CI/CD Pipeline (single job · OIDC authentication · push to main)</text>

  <!-- Stage 1 -->
  <rect x="50" y="112" width="180" height="66" rx="6" fill="#dce6f5" stroke="#4a7fc4" stroke-width="1.4"/>
  <text x="140" y="133" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c5282">Stage 1</text>
  <text x="140" y="147" text-anchor="middle" font-size="10" fill="#2c5282">Static Analysis</text>
  <text x="140" y="162" text-anchor="middle" font-size="9" fill="#4a6a9a">terraform fmt · tflint · checkov</text>
  <text x="140" y="173" text-anchor="middle" font-size="9" fill="#4a6a9a">packer fmt · packer validate</text>

  <!-- Arrow 1→2 -->
  <line x1="234" y1="145" x2="262" y2="145" stroke="#4a7fc4" stroke-width="1.8" marker-end="url(#arrowBlue)"/>

  <!-- Stage 2 -->
  <rect x="266" y="112" width="180" height="66" rx="6" fill="#d4edda" stroke="#2e7d47" stroke-width="1.4"/>
  <text x="356" y="133" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e5631">Stage 2</text>
  <text x="356" y="147" text-anchor="middle" font-size="10" fill="#1e5631">Packer Build</text>
  <text x="356" y="162" text-anchor="middle" font-size="9" fill="#3a7a4f">Amazon Linux 2023 base AMI</text>
  <text x="356" y="173" text-anchor="middle" font-size="9" fill="#3a7a4f">6 CIS hardening scripts → AMI</text>

  <!-- Arrow 2→3 -->
  <line x1="450" y1="145" x2="478" y2="145" stroke="#2e7d47" stroke-width="1.8" marker-end="url(#arrowGreen)"/>

  <!-- Stage 3 -->
  <rect x="482" y="112" width="180" height="66" rx="6" fill="#fff3cd" stroke="#b8860b" stroke-width="1.4"/>
  <text x="572" y="133" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a5a00">Stage 3</text>
  <text x="572" y="147" text-anchor="middle" font-size="10" fill="#7a5a00">Terraform Deploy</text>
  <text x="572" y="162" text-anchor="middle" font-size="9" fill="#9a7a20">terraform plan → terraform apply</text>
  <text x="572" y="173" text-anchor="middle" font-size="9" fill="#9a7a20">11 resources (4 modules)</text>

  <!-- Arrow 3→4 -->
  <line x1="666" y1="145" x2="694" y2="145" stroke="#b8860b" stroke-width="1.8" marker-end="url(#arrowAmber)"/>

  <!-- Stage 4 -->
  <rect x="698" y="112" width="180" height="66" rx="6" fill="#e2d6f0" stroke="#6b3fa0" stroke-width="1.4"/>
  <text x="788" y="133" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a2878">Stage 4</text>
  <text x="788" y="147" text-anchor="middle" font-size="10" fill="#4a2878">Validate</text>
  <text x="788" y="162" text-anchor="middle" font-size="9" fill="#6a4a9a">SSM readiness wait</text>
  <text x="788" y="173" text-anchor="middle" font-size="9" fill="#6a4a9a">pytest — 39 CIS tests via SSM</text>

  <!-- Arrow 4→5 -->
  <line x1="882" y1="145" x2="910" y2="145" stroke="#6b3fa0" stroke-width="1.8" marker-end="url(#arrowPurple)"/>

  <!-- Stage 5 -->
  <rect x="914" y="112" width="240" height="66" rx="6" fill="#f8d7da" stroke="#c0392b" stroke-width="1.4"/>
  <text x="1034" y="133" text-anchor="middle" font-size="11" font-weight="bold" fill="#922b21">Stage 5</text>
  <text x="1034" y="147" text-anchor="middle" font-size="10" fill="#922b21">Teardown</text>
  <text x="1034" y="162" text-anchor="middle" font-size="9" fill="#b03a2e">terraform destroy · deregister AMI</text>
  <text x="1034" y="173" text-anchor="middle" font-size="9" fill="#b03a2e">delete EBS snapshot</text>

  <!-- ================================================================ -->
  <!-- ARROW MARKERS                                                     -->
  <!-- ================================================================ -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a7fc4"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2e7d47"/>
    </marker>
    <marker id="arrowAmber" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#b8860b"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6b3fa0"/>
    </marker>
    <marker id="arrowDark" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3a4a5c"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#d35400"/>
    </marker>
    <marker id="arrowSSM" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6b3fa0"/>
    </marker>
  </defs>


  <!-- ================================================================ -->
  <!-- PACKER BUILD (Stage 2 detail) — left side                        -->
  <!-- ================================================================ -->
  <rect x="30" y="215" width="340" height="310" rx="8" fill="#eaf5ed" stroke="#2e7d47" stroke-width="1.2"/>
  <text x="200" y="238" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e5631">Stage 2 — Packer Build</text>

  <!-- Base AMI -->
  <rect x="55" y="252" width="290" height="36" rx="5" fill="#ffffff" stroke="#2e7d47" stroke-width="1"/>
  <text x="200" y="275" text-anchor="middle" font-size="11" fill="#1e5631">Base AMI: Amazon Linux 2023 (x86_64)</text>

  <!-- Hardening scripts -->
  <rect x="55" y="300" width="290" height="145" rx="5" fill="#ffffff" stroke="#2e7d47" stroke-width="1"/>
  <text x="200" y="318" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e5631">6 CIS Hardening Scripts</text>
  <text x="75" y="338" font-size="10" fill="#3a7a4f">1. harden_updates.sh — automatic security updates</text>
  <text x="75" y="355" font-size="10" fill="#3a7a4f">2. harden_ssh.sh — SSH daemon hardening</text>
  <text x="75" y="372" font-size="10" fill="#3a7a4f">3. harden_filesystem.sh — file permissions</text>
  <text x="75" y="389" font-size="10" fill="#3a7a4f">4. harden_services.sh — disable unused services</text>
  <text x="75" y="406" font-size="10" fill="#3a7a4f">5. harden_audit.sh — audit logging</text>
  <text x="75" y="423" font-size="10" fill="#3a7a4f">6. cleanup.sh — remove temporary files</text>

  <!-- Output AMI -->
  <rect x="55" y="458" width="290" height="36" rx="5" fill="#d4edda" stroke="#2e7d47" stroke-width="1.4"/>
  <text x="200" y="481" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e5631">Golden AMI (CIS-hardened) + manifest.json</text>

  <!-- Arrow from Base AMI to scripts -->
  <line x1="200" y1="288" x2="200" y2="300" stroke="#2e7d47" stroke-width="1.2" marker-end="url(#arrowGreen)"/>
  <!-- Arrow from scripts to output -->
  <line x1="200" y1="445" x2="200" y2="458" stroke="#2e7d47" stroke-width="1.2" marker-end="url(#arrowGreen)"/>

  <!-- Tags label -->
  <text x="200" y="513" text-anchor="middle" font-size="9" fill="#3a7a4f">All resources tagged: Project = "GoldenPipeline"</text>


  <!-- ================================================================ -->
  <!-- AWS INFRASTRUCTURE (Stage 3 detail) — right side                  -->
  <!-- ================================================================ -->

  <!-- AWS region container -->
  <rect x="400" y="215" width="770" height="430" rx="8" fill="#e8ecf1" stroke="#3a4a5c" stroke-width="1.2"/>
  <text x="785" y="238" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2332">Stage 3 — AWS Infrastructure (us-east-1)</text>

  <!-- VPC -->
  <rect x="420" y="250" width="730" height="260" rx="7" fill="#dce6f5" stroke="#4a7fc4" stroke-width="1.2"/>
  <text x="440" y="270" font-size="12" font-weight="bold" fill="#2c5282">VPC</text>

  <!-- Private Subnet -->
  <rect x="440" y="282" width="350" height="210" rx="6" fill="#c9daf0" stroke="#4a7fc4" stroke-width="1"/>
  <text x="460" y="302" font-size="11" font-weight="bold" fill="#2c5282">Private Subnet (no internet gateway)</text>

  <!-- EC2 Instance -->
  <rect x="460" y="314" width="310" height="80" rx="5" fill="#ffffff" stroke="#d35400" stroke-width="1.4"/>
  <text x="615" y="336" text-anchor="middle" font-size="11" font-weight="bold" fill="#d35400">EC2 Test Instance</text>
  <text x="615" y="353" text-anchor="middle" font-size="10" fill="#7a4a20">Launched from golden AMI</text>
  <text x="615" y="368" text-anchor="middle" font-size="10" fill="#7a4a20">No public IP · t3.micro</text>
  <text x="615" y="383" text-anchor="middle" font-size="10" fill="#7a4a20">SSM agent pre-installed</text>

  <!-- Security Group for EC2 -->
  <rect x="460" y="404" width="310" height="44" rx="5" fill="#fef3e0" stroke="#d35400" stroke-width="1"/>
  <text x="615" y="421" text-anchor="middle" font-size="10" font-weight="bold" fill="#d35400">EC2 Security Group</text>
  <text x="615" y="436" text-anchor="middle" font-size="9" fill="#a04000">No inbound · egress HTTPS (443) to VPC CIDR</text>

  <!-- IAM Role -->
  <rect x="460" y="456" width="310" height="28" rx="5" fill="#fff8e1" stroke="#b8860b" stroke-width="1"/>
  <text x="615" y="475" text-anchor="middle" font-size="10" fill="#7a5a00">IAM Role + Instance Profile (AmazonSSMManagedInstanceCore)</text>

  <!-- VPC Endpoints -->
  <rect x="810" y="282" width="320" height="210" rx="6" fill="#e8d5f5" stroke="#6b3fa0" stroke-width="1.2"/>
  <text x="970" y="302" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a2878">VPC Endpoints (Interface)</text>

  <rect x="830" y="314" width="280" height="36" rx="4" fill="#ffffff" stroke="#6b3fa0" stroke-width="1"/>
  <text x="970" y="337" text-anchor="middle" font-size="10" fill="#4a2878">com.amazonaws.us-east-1.ssm</text>

  <rect x="830" y="360" width="280" height="36" rx="4" fill="#ffffff" stroke="#6b3fa0" stroke-width="1"/>
  <text x="970" y="383" text-anchor="middle" font-size="10" fill="#4a2878">com.amazonaws.us-east-1.ssmmessages</text>

  <rect x="830" y="406" width="280" height="36" rx="4" fill="#ffffff" stroke="#6b3fa0" stroke-width="1"/>
  <text x="970" y="429" text-anchor="middle" font-size="10" fill="#4a2878">com.amazonaws.us-east-1.ec2messages</text>

  <!-- VPC Endpoint Security Group -->
  <rect x="830" y="452" width="280" height="32" rx="4" fill="#f3e8fc" stroke="#6b3fa0" stroke-width="1"/>
  <text x="970" y="472" text-anchor="middle" font-size="9" fill="#4a2878">VPCE Security Group — HTTPS (443) from VPC CIDR</text>

  <!-- Arrow: EC2 → VPC Endpoints (HTTPS 443) -->
  <line x1="770" y1="354" x2="826" y2="354" stroke="#6b3fa0" stroke-width="1.6" stroke-dasharray="6,3" marker-end="url(#arrowSSM)"/>
  <text x="798" y="347" text-anchor="middle" font-size="8" fill="#6b3fa0">443</text>

  <!-- Terraform state label -->
  <rect x="420" y="520" width="200" height="32" rx="5" fill="#ffffff" stroke="#3a4a5c" stroke-width="1"/>
  <text x="520" y="541" text-anchor="middle" font-size="10" fill="#3a4a5c">Terraform state: local (ephemeral)</text>

  <!-- Resource count -->
  <rect x="640" y="520" width="200" height="32" rx="5" fill="#ffffff" stroke="#3a4a5c" stroke-width="1"/>
  <text x="740" y="541" text-anchor="middle" font-size="10" fill="#3a4a5c">11 resources · 4 modules</text>

  <!-- default_tags label -->
  <rect x="860" y="520" width="290" height="32" rx="5" fill="#ffffff" stroke="#3a4a5c" stroke-width="1"/>
  <text x="1005" y="541" text-anchor="middle" font-size="10" fill="#3a4a5c">default_tags: Project = "GoldenPipeline"</text>


  <!-- ================================================================ -->
  <!-- ARROW: Packer output → Terraform (AMI lookup)                     -->
  <!-- ================================================================ -->
  <path d="M 345 476 C 370 476, 370 354, 456 354" fill="none" stroke="#3a4a5c" stroke-width="1.6" marker-end="url(#arrowDark)"/>
  <text x="386" y="400" font-size="9" fill="#3a4a5c" transform="rotate(-50, 386, 400)">aws_ami data source</text>


  <!-- ================================================================ -->
  <!-- STAGE 4 — VALIDATION (bottom left)                               -->
  <!-- ================================================================ -->
  <rect x="30" y="558" width="340" height="115" rx="8" fill="#f0eaf8" stroke="#6b3fa0" stroke-width="1.2"/>
  <text x="200" y="580" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a2878">Stage 4 — Validation</text>
  <text x="200" y="600" text-anchor="middle" font-size="10" fill="#6a4a9a">pytest runs 39 CIS tests via SSM SendCommand</text>
  <text x="200" y="618" text-anchor="middle" font-size="10" fill="#6a4a9a">5 test files (1-to-1 mapping with hardening scripts)</text>
  <text x="200" y="638" text-anchor="middle" font-size="10" fill="#6a4a9a">SSM readiness poll (max 300 seconds) before tests</text>
  <text x="200" y="656" text-anchor="middle" font-size="10" fill="#6a4a9a">boto3 SSM client via conftest.py shared fixture</text>

  <!-- Arrow from validation to EC2 (SSM) -->
  <path d="M 370 610 L 456 380" fill="none" stroke="#6b3fa0" stroke-width="1.4" stroke-dasharray="6,3" marker-end="url(#arrowSSM)"/>
  <text x="400" y="510" font-size="9" fill="#6b3fa0" transform="rotate(-60, 400, 510)">SSM SendCommand</text>


  <!-- ================================================================ -->
  <!-- LEGEND                                                            -->
  <!-- ================================================================ -->
  <rect x="30" y="700" width="550" height="200" rx="8" fill="#ffffff" stroke="#c5cdd8" stroke-width="1"/>
  <text x="50" y="724" font-size="13" font-weight="bold" fill="#1a2332">Legend</text>

  <!-- Pipeline stages -->
  <rect x="50" y="736" width="16" height="12" rx="2" fill="#dce6f5" stroke="#4a7fc4" stroke-width="1"/>
  <text x="74" y="747" font-size="10" fill="#3a4a5c">Static analysis (quality gate)</text>

  <rect x="50" y="756" width="16" height="12" rx="2" fill="#d4edda" stroke="#2e7d47" stroke-width="1"/>
  <text x="74" y="767" font-size="10" fill="#3a4a5c">Packer build (AMI bake)</text>

  <rect x="50" y="776" width="16" height="12" rx="2" fill="#fff3cd" stroke="#b8860b" stroke-width="1"/>
  <text x="74" y="787" font-size="10" fill="#3a4a5c">Terraform infrastructure</text>

  <rect x="50" y="796" width="16" height="12" rx="2" fill="#e2d6f0" stroke="#6b3fa0" stroke-width="1"/>
  <text x="74" y="807" font-size="10" fill="#3a4a5c">SSM connectivity and validation</text>

  <rect x="50" y="816" width="16" height="12" rx="2" fill="#f8d7da" stroke="#c0392b" stroke-width="1"/>
  <text x="74" y="827" font-size="10" fill="#3a4a5c">Teardown (destroy + deregister + delete snapshot)</text>

  <!-- Line types -->
  <line x1="310" y1="742" x2="346" y2="742" stroke="#3a4a5c" stroke-width="1.4"/>
  <text x="354" y="746" font-size="10" fill="#3a4a5c">Data flow</text>

  <line x1="310" y1="762" x2="346" y2="762" stroke="#6b3fa0" stroke-width="1.4" stroke-dasharray="6,3"/>
  <text x="354" y="766" font-size="10" fill="#3a4a5c">SSM connectivity (HTTPS 443)</text>

  <!-- Networking -->
  <text x="50" y="855" font-size="10" font-weight="bold" fill="#1a2332">Network posture:</text>
  <text x="50" y="872" font-size="10" fill="#3a4a5c">No internet gateway · no public subnet · no public IP · no inbound security group rules</text>
  <text x="50" y="889" font-size="10" fill="#3a4a5c">All AWS API traffic stays within the VPC via interface endpoints</text>


  <!-- ================================================================ -->
  <!-- KEY DECISIONS                                                     -->
  <!-- ================================================================ -->
  <rect x="610" y="700" width="560" height="200" rx="8" fill="#ffffff" stroke="#c5cdd8" stroke-width="1"/>
  <text x="630" y="724" font-size="13" font-weight="bold" fill="#1a2332">Key Decisions</text>

  <text x="630" y="746" font-size="10" fill="#3a4a5c">OIDC authentication — no static IAM credentials stored in GitHub</text>
  <text x="630" y="764" font-size="10" fill="#3a4a5c">SSM over SSH — no open ports, no key pairs, IAM-only authentication</text>
  <text x="630" y="782" font-size="10" fill="#3a4a5c">Private subnet + VPC endpoints — zero public internet exposure</text>
  <text x="630" y="800" font-size="10" fill="#3a4a5c">Single CI/CD job — local Terraform state, no artifact passing risk</text>
  <text x="630" y="818" font-size="10" fill="#3a4a5c">Data source AMI lookup — no manual AMI ID copy between tools</text>
  <text x="630" y="836" font-size="10" fill="#3a4a5c">Full tagging (Packer + Terraform) — all resources in Cost Explorer</text>
  <text x="630" y="854" font-size="10" fill="#3a4a5c">AMI + snapshot cleanup in teardown — no silent resource accumulation</text>
  <text x="630" y="872" font-size="10" fill="#3a4a5c">IaC discipline — every resource managed by Terraform (lesson from TerraDriftGuard)</text>

  <!-- Footer -->
  <text x="600" y="912" text-anchor="middle" font-size="10" fill="#8a95a5">GoldenPipeline — Designed and implemented by Malik Hamdane — 2026</text>

</svg>
