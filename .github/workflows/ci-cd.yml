# GoldenPipeline CI/CD
#
# A single job is used rather than separate jobs per stage.
# Terraform state is stored locally (see architecture decisions,
# section 4.3). Splitting stages into separate jobs would require
# passing the state file between runners via artifacts, which
# introduces a failure mode where a failed artifact upload
# prevents teardown and leaves resources stranded.
#
# A single job keeps state on disk across all stages and
# guarantees that the teardown step can always reach it.

name: GoldenPipeline CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  PACKER_DIR: packer
  TERRAFORM_DIR: terraform
  PYTHON_VERSION: "3.12"
  PACKER_MANIFEST: manifest.json

jobs:
  pipeline:
    name: Golden AMI Pipeline
    runs-on: ubuntu-latest

    steps:

      # -------------------------------------------------
      # Setup
      # -------------------------------------------------

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Set up Packer
        uses: hashicorp/setup-packer@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      # -------------------------------------------------
      # Stage 1 — Static analysis (quality gate)
      # -------------------------------------------------

      - name: "Stage 1: terraform fmt -check"
        run: terraform fmt -check -recursive
        working-directory: ${{ env.TERRAFORM_DIR }}

      - name: "Stage 1: Set up tflint"
        uses: terraform-linters/setup-tflint@v4

      - name: "Stage 1: tflint"
        run: |
          tflint --init
          tflint --recursive
        working-directory: ${{ env.TERRAFORM_DIR }}

      - name: "Stage 1: checkov"
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.TERRAFORM_DIR }}
          framework: terraform

      - name: "Stage 1: packer fmt -check"
        run: packer fmt -check .
        working-directory: ${{ env.PACKER_DIR }}

      - name: "Stage 1: packer init"
        run: packer init .
        working-directory: ${{ env.PACKER_DIR }}

      - name: "Stage 1: packer validate"
        run: packer validate .
        working-directory: ${{ env.PACKER_DIR }}

      # -------------------------------------------------
      # Stage 2 — Build
      # -------------------------------------------------

      # The AMI ID is extracted from the Packer manifest
      # file. The Packer template (.pkr.hcl) must include
      # a manifest post-processor that writes to the file
      # named in the PACKER_MANIFEST environment variable.

      - name: "Stage 2: packer build"
        if: github.event_name == 'push'
        id: packer_build
        run: |
          packer build .
          AMI_ID=$(jq -r '.builds[-1].artifact_id' "${PACKER_MANIFEST}" | cut -d: -f2)
          echo "ami_id=${AMI_ID}" >> "${GITHUB_OUTPUT}"
        working-directory: ${{ env.PACKER_DIR }}

      # -------------------------------------------------
      # Stage 3 — Deploy test infrastructure
      # -------------------------------------------------

      - name: "Stage 3: terraform init"
        if: github.event_name == 'push'
        run: terraform init
        working-directory: ${{ env.TERRAFORM_DIR }}

      - name: "Stage 3: terraform plan"
        if: github.event_name == 'push'
        run: terraform plan -out=tfplan
        working-directory: ${{ env.TERRAFORM_DIR }}

      - name: "Stage 3: terraform apply"
        if: github.event_name == 'push'
        run: terraform apply tfplan
        working-directory: ${{ env.TERRAFORM_DIR }}

      # -------------------------------------------------
      # Stage 4 — Validate
      # -------------------------------------------------

      - name: "Stage 4: CIS validation tests"
        if: github.event_name == 'push'
        run: pytest tests/ -v

      # -------------------------------------------------
      # Stage 5 — Teardown
      # -------------------------------------------------

      - name: "Stage 5: terraform destroy"
        if: always() && github.event_name == 'push'
        run: |
          if [ -d ".terraform" ]; then
            terraform destroy -auto-approve
          fi
        working-directory: ${{ env.TERRAFORM_DIR }}

      - name: "Stage 5: Deregister AMI and delete snapshot"
        if: always() && github.event_name == 'push'
        env:
          AMI_ID: ${{ steps.packer_build.outputs.ami_id }}
        run: |
          if [ -n "${AMI_ID}" ]; then
            QUERY='Images[0].BlockDeviceMappings[0].Ebs.SnapshotId'
            SNAPSHOT_ID=$(aws ec2 describe-images --image-ids "${AMI_ID}" --query "${QUERY}" --output text 2>/dev/null)
            aws ec2 deregister-image --image-id "${AMI_ID}" 2>/dev/null || true
            if [ -n "${SNAPSHOT_ID}" ] && [ "${SNAPSHOT_ID}" != "None" ]; then
              aws ec2 delete-snapshot --snapshot-id "${SNAPSHOT_ID}" 2>/dev/null || true
            fi
          fi
